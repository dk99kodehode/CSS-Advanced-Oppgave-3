<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Animations + Transitions</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <header>
        <div class="head-text">
          <h1>CSS Animations , Transitions & Transforms.</h1>

          <p>Eksemplar på animationer, transitions og transforms.</p>

          <nav>
            <a href="https://github.com/dk99kodehode?tab=repositories"
              >Github repo</a
            >
          </nav>
        </div>
      </header>

      <section class="box" id="Card">
        <div>
          <h2>Transform</h2>
        </div>

        <div class="cards-container">
          <article class="square-card">
            <div class="card-side front">
              <h3>Framside</h3>
              <p>Dette er framsiden</p>
            </div>

            <div class="card-side back">
              <h3>Backside</h3>
              <p>Dette er baksiden</p>
            </div>
          </article>
        </div>
      </section>

      <section class="box" id="Disco">
        <div>
          <h4>Reload disco</h4>
        </div>
      </section>

      <section class="box" id="Image">
        <div class="having-fun">
          <div class="funny">
            <img src="Images/monkey.png" alt="monkey image" />
          </div>
        </div>
      </section>

      <section class="boxes">
        <h2>Spinning</h2>
        <article class="cube">
          <div class="cube-face">
            <div class="face front"></div>
            <div class="face back"></div>
            <div class="face left"></div>
            <div class="face right"></div>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
